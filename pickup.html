<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>模型取りに来てください | ファインテック</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --navy: #0d2240;
    --navy-deep: #081a33;
    --sky: #2ba9c9;
    --sky-deep: #1d7e96;
    --sky-pale: #eaf8fb;
    --mint: #2bb99a;
    --ink: #1f2d33;
    --ink-soft: #5b6b72;
    --line: #dce8ec;
    --bg: #f3f9fb;
    --white: #ffffff;
    --warn: #e8633c;
  }

  html, body {
    background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 0 0 48px;
  }

  .screen {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--white);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ===== Header ===== */
  .topbar {
    background: linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 100%);
    padding: 24px 24px 26px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .topbar::after {
    content: "";
    position: absolute;
    right: -30px;
    top: -30px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .topbar::before {
    content: "";
    position: absolute;
    right: 30px;
    bottom: -50px;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }
  .brand-logo {
    width: 42px;
    height: auto;
    color: #fff;
    flex-shrink: 0;
  }
  .brand-text {
    line-height: 1.15;
  }
  .brand-text .en {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
  }
  .brand-text .jp {
    font-size: 10px;
    letter-spacing: 1.5px;
    opacity: 0.7;
    margin-top: 1px;
  }
  .clinic-name {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 23px;
    line-height: 1.35;
    position: relative;
    z-index: 1;
  }
  .clinic-name .label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    opacity: 0.7;
    margin-bottom: 2px;
    letter-spacing: 1px;
  }

  /* ===== Main ===== */
  .main {
    flex: 1;
    padding: 28px 22px 16px;
  }

  .lead {
    text-align: center;
    margin-bottom: 24px;
  }
  .lead-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
  }
  .lead-sub {
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-top: 4px;
    line-height: 1.6;
  }

  /* Status toggle */
  .status-group {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
  }
  .status-btn {
    flex: 1;
    border: 2px solid var(--line);
    background: var(--white);
    border-radius: 16px;
    padding: 22px 8px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    -webkit-user-select: none;
    user-select: none;
  }
  .status-btn:active { transform: scale(0.97); }
  .status-btn .icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #f0f4f5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: background 0.15s;
  }
  .status-btn .txt {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 14.5px;
    color: var(--ink-soft);
  }
  .status-btn[data-selected="true"] {
    border-color: var(--sky);
    background: var(--sky-pale);
  }
  .status-btn[data-selected="true"] .icon {
    background: var(--sky);
  }
  .status-btn[data-selected="true"] .txt {
    color: var(--sky-deep);
  }
  .status-btn.none[data-selected="true"] {
    border-color: #9aa7ac;
    background: #f3f5f6;
  }
  .status-btn.none[data-selected="true"] .icon {
    background: #8b9aa1;
  }
  .status-btn.none[data-selected="true"] .txt {
    color: var(--ink);
  }

  /* Memo */
  .field {
    margin-bottom: 22px;
  }
  .field-label {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink-soft);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .field-label .opt {
    font-size: 10.5px;
    font-weight: 500;
    background: #eef2f3;
    color: var(--ink-soft);
    padding: 2px 7px;
    border-radius: 20px;
  }
  textarea {
    width: 100%;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    resize: none;
    height: 70px;
    transition: border-color 0.15s;
  }
  textarea:focus {
    outline: none;
    border-color: var(--sky);
  }
  textarea::placeholder { color: #aebac0; }

  /* Submit */
  .submit-btn {
    width: 100%;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--sky-deep), var(--sky));
    color: #fff;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 17px;
    padding: 17px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    box-shadow: 0 8px 18px -6px rgba(29,126,150,0.45);
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
  }
  .submit-btn:active { transform: scale(0.985); }
  .submit-btn:disabled {
    opacity: 0.55;
    cursor: default;
    box-shadow: none;
  }
  .submit-btn .spinner {
    width: 16px; height: 16px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .submit-btn[data-loading="true"] .spinner { display: inline-block; }
  .submit-btn[data-loading="true"] .btn-text { opacity: 0.85; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .history-link-btn {
    width: 100%;
    border: none;
    background: none;
    color: var(--sky-deep);
    font-size: 13px;
    font-weight: 700;
    padding: 14px 0 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
  }
  .history-link-btn svg { color: var(--sky-deep); flex-shrink: 0; }
  .history-link-btn:active { opacity: 0.65; }

  /* ===== Result screen ===== */
  .result {
    flex: 1;
    padding: 40px 24px 16px;
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .result[data-show="true"] { display: flex; }
  .result[data-mode="history"] { padding-top: 28px; }
  .result[data-mode="history"] #resultCheck,
  .result[data-mode="history"] #resultTitle {
    display: none;
  }
  .result-check {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--mint);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    animation: pop 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .result-check svg { width: 34px; height: 34px; }
  .result-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 6px;
  }
  .result-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 28px;
    line-height: 1.7;
  }
  .result-sub b { color: var(--ink); }

  .again-btn {
    background: none;
    border: 1.5px solid var(--line);
    color: var(--sky-deep);
    font-weight: 700;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    margin-bottom: 30px;
  }

  /* History */
  .history {
    width: 100%;
    text-align: left;
  }
  .history-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .history-title {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink-soft);
  }
  .history-count {
    font-size: 12px;
    color: var(--sky-deep);
    font-weight: 700;
    background: var(--sky-pale);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .history-list {
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
  }
  .history-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--white);
  }
  .history-item:last-child { border-bottom: none; }
  .history-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .history-dot.has { background: var(--sky); }
  .history-dot.none { background: #c2ccd0; }
  .history-body { flex: 1; min-width: 0; }
  .history-row1 {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
  }
  .history-time { color: var(--ink-soft); font-weight: 500; font-size: 12px; }
  .history-memo {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
    line-height: 1.5;
    word-break: break-all;
  }
  .history-empty {
    padding: 22px 14px;
    text-align: center;
    font-size: 12.5px;
    color: #aebac0;
  }
  .history-loading {
    padding: 22px 14px;
    text-align: center;
    font-size: 12.5px;
    color: #aebac0;
  }

  /* Error banner */
  .error-banner {
    display: none;
    background: #fdeeea;
    border: 1px solid #f3c5b4;
    color: var(--warn);
    font-size: 12.5px;
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .error-banner[data-show="true"] { display: block; }

  .footer-note {
    text-align: center;
    font-size: 10.5px;
    color: #b7c1c5;
    padding: 18px 0 6px;
  }

  .footer-contact {
    border-top: 1px solid var(--line);
    margin-top: 8px;
    padding: 18px 22px 22px;
    text-align: center;
  }
  .footer-contact .fc-name {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 12.5px;
    color: var(--navy);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .footer-contact .fc-line {
    font-size: 11.5px;
    color: var(--ink-soft);
    line-height: 1.8;
  }
  .footer-contact .fc-line a {
    color: var(--ink-soft);
    text-decoration: none;
  }
</style>
</head>

    <div class="fc-name">株式会社ファインテック</div>
    <div class="fc-line">
      〒882-0866　宮崎県延岡市平原町5丁目696番地1<br>
      TEL：0982-35-4630　/　090-5930-0347<br>
      <a href="mailto:fineteclabo@gmail.com">fineteclabo@gmail.com</a>
    </div>
  </div>
</div>

<script>
  // ===== 設定 =====
  // GASのWebアプリURL（デプロイ後に書き換えてください）
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyZrHACPjTuZh6Sq587woYyPXVrYmfHCQEWpYhQF_wLZ7S-P7afNonkl2wkfgmdxuch/exec";

  // ===== 医院名の解決 =====
  // pickup.html?clinic=hori のようにURLパラメータで医院キーを渡す
  // キー → 表示名の対応表（医院を追加する場合はここに追記）
  const CLINIC_MAP = {
    "hori": "ほり歯科医院"
    // 例: "harada": "原田歯科医院",
  };

  const params = new URLSearchParams(window.location.search);
  const clinicKey = (params.get("clinic") || "").trim();
  const clinicName = CLINIC_MAP[clinicKey] || null;

  const clinicNameText = document.getElementById("clinicNameText");
  const mainScreen = document.getElementById("mainScreen");
  const resultScreen = document.getElementById("resultScreen");
  const errorBanner = document.getElementById("errorBanner");

  let selectedStatus = null;

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.setAttribute("data-show", "true");
  }
  function clearError() {
    errorBanner.setAttribute("data-show", "false");
  }

  if (!clinicName) {
    clinicNameText.textContent = "医院が特定できません";
    showError("URLに医院の指定がありません。このページのURLが正しいか、ブックマークを確認してください。お手数ですが技工所にご連絡ください。");
    document.getElementById("submitBtn").disabled = true;
    document.getElementById("btnHas").style.pointerEvents = "none";
    document.getElementById("btnNone").style.pointerEvents = "none";
    document.getElementById("historyLinkBtn").style.visibility = "hidden";
  } else {
    clinicNameText.textContent = clinicName;
  }

  // ===== ステータス選択 =====
  const btnHas = document.getElementById("btnHas");
  const btnNone = document.getElementById("btnNone");
  const submitBtn = document.getElementById("submitBtn");
  const submitBtnText = document.getElementById("submitBtnText");

  function selectStatus(value, btnEl) {
    selectedStatus = value;
    [btnHas, btnNone].forEach(b => b.removeAttribute("data-selected"));
    btnEl.setAttribute("data-selected", "true");
    submitBtn.disabled = !clinicName;
  }
  btnHas.addEventListener("click", () => selectStatus("あり", btnHas));
  btnNone.addEventListener("click", () => selectStatus("なし", btnNone));

  // ===== 送信 =====
  submitBtn.addEventListener("click", async () => {
    if (!selectedStatus || !clinicName) return;
    clearError();
    submitBtn.disabled = true;
    submitBtn.setAttribute("data-loading", "true");
    submitBtnText.textContent = "送信中...";

    const memo = document.getElementById("memoInput").value.trim();

    try {
      const res = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          action: "submit",
          clinicKey: clinicKey,
          clinicName: clinicName,
          status: selectedStatus,
          memo: memo
        })
      });
      const data = await res.json();
      if (!data || data.result !== "ok") {
        throw new Error((data && data.message) || "送信に失敗しました");
      }

      // 結果画面へ（送信完了モード）
      document.getElementById("resultSub").innerHTML =
        clinicName + " さんから「<b>模型" + selectedStatus + "</b>」で送信しました。<br>ご連絡ありがとうございました。";
      resultScreen.setAttribute("data-mode", "submit");
      againBtn.textContent = "もう一度送信する";
      mainScreen.style.display = "none";
      resultScreen.setAttribute("data-show", "true");
      loadHistory();

    } catch (err) {
      showError("送信できませんでした。電波状況をご確認のうえ、もう一度お試しください。解決しない場合はお電話にてご連絡ください。");
      submitBtn.disabled = false;
    } finally {
      submitBtn.removeAttribute("data-loading");
      submitBtnText.textContent = "送信する";
    }
  });

  // ===== 送信履歴を見る（入力内容はそのまま保持） =====
  const historyLinkBtn = document.getElementById("historyLinkBtn");
  const againBtn = document.getElementById("againBtn");

  historyLinkBtn.addEventListener("click", () => {
    if (!clinicName) return;
    resultScreen.setAttribute("data-mode", "history");
    document.getElementById("resultSub").innerHTML = clinicName + " さんの送信履歴です。";
    againBtn.textContent = "入力画面に戻る";
    mainScreen.style.display = "none";
    resultScreen.setAttribute("data-show", "true");
    loadHistory();
  });

  // ===== 戻る（送信完了 / 履歴単独表示の両方で使用） =====
  againBtn.addEventListener("click", () => {
    const mode = resultScreen.getAttribute("data-mode");
    resultScreen.setAttribute("data-show", "false");
    mainScreen.style.display = "block";

    // 送信完了から戻る場合のみ、フォームをリセットする
    if (mode === "submit") {
      selectedStatus = null;
      [btnHas, btnNone].forEach(b => b.removeAttribute("data-selected"));
      document.getElementById("memoInput").value = "";
      submitBtn.disabled = true;
    }
  });

  // ===== 履歴取得 =====
  async function loadHistory() {
    const listEl = document.getElementById("historyList");
    const countEl = document.getElementById("historyCount");
    listEl.innerHTML = '<div class="history-loading">読み込み中...</div>';

    try {
      const url = GAS_URL + "?action=history&clinicKey=" + encodeURIComponent(clinicKey);
      const res = await fetch(url, { method: "GET" });
      const data = await res.json();

      if (!data || data.result !== "ok") throw new Error("履歴取得失敗");

      countEl.textContent = "本日 " + data.todayCount + "件";

      if (!data.items || data.items.length === 0) {
        listEl.innerHTML = '<div class="history-empty">本日の送信履歴はまだありません</div>';
        return;
      }

      listEl.innerHTML = data.items.map(item => {
        const dotClass = item.status === "あり" ? "has" : "none";
        const memoHtml = item.memo ? '<div class="history-memo">' + escapeHtml(item.memo) + '</div>' : "";
        return '<div class="history-item">' +
          '<div class="history-dot ' + dotClass + '"></div>' +
          '<div class="history-body">' +
            '<div class="history-row1"><span>模型' + item.status + '</span><span class="history-time">' + item.time + '</span></div>' +
            memoHtml +
          '</div>' +
        '</div>';
      }).join("");

    } catch (err) {
      listEl.innerHTML = '<div class="history-empty">履歴を取得できませんでした</div>';
    }
  }

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }
</script>

</body>
</html>
